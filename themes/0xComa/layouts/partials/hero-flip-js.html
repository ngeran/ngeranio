<script>
document.addEventListener('DOMContentLoaded', function() {
  var el = document.getElementById('hero-title');
  if (!el) return;

  var text = el.getAttribute('data-text');
  var container = el.querySelector('.flip-board');
  var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';

  // Build letter spans
  for (var i = 0; i < text.length; i++) {
    var span = document.createElement('span');
    span.className = 'flip-letter';
    span.textContent = ' ';
    span.setAttribute('data-target', text[i]);
    container.appendChild(span);
  }

  var letters = el.querySelectorAll('.flip-letter');

  // For each slot, cycle random chars then land on target
  letters.forEach(function(span, idx) {
    var target = span.getAttribute('data-target');
    var cycles = 6 + idx;
    var speed = 55;
    var step = 0;
    var delay = idx * 120;

    setTimeout(function() {
      var timer = setInterval(function() {
        step++;
        if (step >= cycles) {
          clearInterval(timer);
          span.classList.add('flip-out');
          setTimeout(function() {
            span.textContent = target;
            span.classList.remove('flip-out');
            span.classList.add('flip-in');
          }, 150);
          return;
        }
        var rand = chars[Math.floor(Math.random() * chars.length)];
        span.textContent = rand;
      }, speed);
    }, delay);
  });
});
</script>
