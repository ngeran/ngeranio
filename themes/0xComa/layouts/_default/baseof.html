<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}" dir="{{ .Language.Direction | default `ltr` }}" class="scroll-smooth">
<head>
  {{ partial "head.html" . }}
</head>
<body class="bg-black text-on-surface antialiased bg-grid font-sans">

  {{ partial "header.html" . }}

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  <footer>
    {{ if .IsHome }}
      {{ partial "footer.html" . }}
    {{ else }}
      {{ partial "footer-single.html" . }}
    {{ end }}
  </footer>

  {{ if .Store.Get "hasMermaid" }}
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: true });
  </script>
  {{ end }}

  {{ partial "head/js.html" . }}

  <script>
    document.getElementById('mobile-menu-button')?.addEventListener('click', () => {
      document.getElementById('mobile-menu')?.classList.toggle('hidden');
    });
  </script>
</body>
</html>
