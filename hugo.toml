[params.author]
    name = "ngeran a.k.a nikos"
    image = "author/avatar.png"
    imageQuality = 96
    headline = "Welcome to My Networking Blog"
    bio = "I'm a network engineer by day and an aspiring JNCIE-SP by night. The JNCIE-SP journey is demanding—it requires time, dedication, and relentless hard work. To stay organized and focused, I'll be sharing my study notes here. My hope is that these notes not only aid my own preparation but also help others pursuing the same goal. Thanks for visiting, and enjoy the journey with me!. Enjoy :-)"
