baseURL = "https://ngeranio.com/"
locale = 'en-us'
title = 'ngeran[io]'
theme = '0xComa'
pagerSize = 6


  [params]
  mainSections = ['routing', 'automation', 'ai', 'linux', 'labs', 'observability', 'junos']
  enableNextPrevPages = true

# -- Site Menu (flat top-level categories) --

[[menus.main]]
 name = 'home'
 pageRef = '/'
 weight = 10

[[menus.main]]
 name = 'routing'
 pageRef = '/routing'
 weight = 20

[[menus.main]]
 name = 'automation'
 pageRef = '/automation'
 weight = 30

[[menus.main]]
 name = 'ai'
 pageRef = '/ai'
 weight = 40

[[menus.main]]
 name = 'linux'
 pageRef = '/linux'
 weight = 50

[[menus.main]]
 name = 'labs'
 pageRef = '/labs'
 weight = 60

[[menus.main]]
 name = 'observability'
 pageRef = '/observability'
 weight = 70

[[menus.main]]
 name = 'junos'
 pageRef = '/junos'
 weight = 80


 [params.site]
  logo = "/networking-dark.png"

[taxonomies]
  category = "categories"

[permalinlks]
  categories = "/:section/:slug"

# -- Markup --

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[highlight]
  noClasses = false

[tableOfContents]
  startLevel = 2
  endLevel = 4



[params.author]
    name = "ngeran a.k.a nikos"
    image = "author/avatar.png"
    imageQuality = 96
    headline = "Welcome to My Networking Blog"
    bio = "Every packet tells a story — we read them all. A network engineering blog covering routing, automation, observability, and the art of solving problems at scale."
